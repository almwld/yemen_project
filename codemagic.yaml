workflows:
  flex-yemen-release:
    name: Flex Yemen Supabase Final 36
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Setup and Build APK
        script: |
          # 1. تنظيف وإعادة بناء القالب لضمان عدم وجود ملفات قديمة
          rm -rf android
          flutter create . --platforms android --org com.almwld
          
          # 2. حقن إعدادات الـ SDK 36 الإجبارية
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

          # 3. استبدال build.gradle بنسخة تدعم SDK 36 وتوافق Supabase
          cat <<EOT > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.almwld"
              compileSdk 36
              defaultConfig {
                  applicationId "com.almwld"
                  minSdk 21
                  targetSdk 36
                  versionCode 1
                  versionName "1.0.0"
                  multiDexEnabled true
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = '1.8' }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'
          }
          EOT

          # 4. البناء النهائي
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
