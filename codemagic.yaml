workflows:
  android-workflow:
    name: Yemen Market Final Clean Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Fresh Clone and Build
        script: | 
          # 1. إنشاء مجلد بناء جديد تماماً خارج مسار Git
          cd ..
          rm -rf build_system
          flutter create --platforms android --org com.yemenmarket --project-name yemen_market_new build_system
          
          # 2. نقل ملفات الـ lib والـ assets والـ pubspec النظيفة فقط
          cp -r yemen_project/lib/* build_system/lib/
          cp -r yemen_project/assets/* build_system/assets/ || echo "No assets"
          cp yemen_project/pubspec.yaml build_system/pubspec.yaml

          # 3. إعداد Firebase بشكل سليم
          mkdir -p build_system/android/app
          cp yemen_project/google-services.json build_system/android/app/

          # 4. الدخول وبدء البناء من الصفر
          cd build_system
          
          # ربط Firebase في ملفات Gradle الجديدة
          sed -i 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.1"/' android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

          # 5. إعادة الملف الناتج للمكان الصحيح
          mkdir -p ../yemen_project/build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk ../yemen_project/build/app/outputs/flutter-apk/
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
