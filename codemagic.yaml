workflows:
  android-workflow:
    name: Yemen Market Fix Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Reconstruct Project Structure
        script: |
          # العودة للمجلد الرئيسي
          cd ..
          # إنشاء مشروع جديد مؤقت لإخراج ملفات Gradle سليمة
          flutter create -t app --org com.yemen.market --project-name yemen_market temp_project
          # نقل ملفات أندرويد السليمة إلى مشروعك
          cp -r temp_project/android src/
          cd src
          flutter pub get
      - name: Build Android APK
        script: |
          cd src
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - src/build/app/outputs/flutter-apk/*.apk
