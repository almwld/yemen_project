workflows:
  android-workflow:
    name: Yemen Market Root Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Clean and Get Packages
        script: |
          # نحن الآن في الجذر مباشرة، لا داعي لـ cd src
          flutter clean
          flutter pub get
      - name: Build Android APK
        script: |
          # البناء من الجذر مباشرة
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
