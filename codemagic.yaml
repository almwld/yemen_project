workflows:
  flex-yemen-release:
    name: Flex Yemen Universal Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    triggering:
      events:
        - push
    scripts:
      - name: Build Android APK
        script: |
          flutter packages pub get
          # تم حذف --split-per-abi لإنتاج ملف واحد فقط
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
