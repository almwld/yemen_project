workflows:
  flex-yemen-release:
    name: Flex Yemen M2 Final Version
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Setup and Build APK
        script: |
          # 1. إعادة بناء البيئة وحقن المكتبة
          rm -rf android
          flutter create . --platforms android --org com.almwld
          flutter pub add app_links
          
          # 2. حقن الخصائص الأساسية
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 3. تفعيل Desugaring (حل مشكلة التنبيهات)
          sed -i '' 's/multiDexEnabled true/multiDexEnabled true\n        coreLibraryDesugaringEnabled true/g' android/app/build.gradle
          
          # 4. إضافة مكتبة التوافق في التبعيات
          sed -i '' '/dependencies {/a               coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.0.3"           ' android/app/build.gradle

          # 5. البناء النهائي
          flutter pub get
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
