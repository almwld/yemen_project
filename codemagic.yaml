workflows:
  android-workflow:
    name: Yemen Market - Final Victory
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Cold Start Reconstruction
        script: | 
          # 1. إنشاء تطبيق "شبح" نظيف تماماً بعيداً عن المجلد الحالي
          cd ..
          flutter create --platforms android --org com.yemenmarket --project-name yemen_market ghost_app
          
          # 2. نقل ملفات الأندرويد "النظيفة" فقط إلى مجلد مشروعنا
          cp -r ghost_app/android yemen_project/
          
          # 3. العودة لمجلد المشروع وتجهيز الفايربيس
          cd yemen_project
          mkdir -p android/app
          if [ -f google-services.json ]; then
            cp google-services.json android/app/
          fi
          
          # 4. حقن إعدادات Gradle في الهيكل الجديد
          echo "buildscript { dependencies { classpath 'com.google.gms:google-services:4.4.1' } }" > android/build.gradle.tmp
          cat android/build.gradle >> android/build.gradle.temp
          mv android/build.gradle.temp android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

      - name: Absolute Build
        script: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
