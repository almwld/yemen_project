workflows:
  flex-yemen-release:
    name: Flex Yemen M2 Final Version
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Setup and Build APK
        script: |
          # 1. تصفير البيئة
          rm -rf android
          flutter create . --platforms android --org com.almwld
          
          # 2. حقن الخصائص الأساسية
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

          # 3. استبدال محتوى ملف build.gradle يدويا لضمان تفعيل Desugaring
          cat <<EOT > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.almwld"
              compileSdk 34
              defaultConfig {
                  applicationId "com.almwld"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0.0"
                  multiDexEnabled true
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = '1.8' }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled true
                      shrinkResources true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'
          }
          EOT

          # 4. البناء النهائي
          flutter pub get
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
