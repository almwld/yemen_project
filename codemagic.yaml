workflows:
  flex-yemen-release:
    name: Flex Yemen Final Fix
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
    triggering:
      events:
        - push
       cancel_previous_builds_on_new_commit: true
    scripts:
      - name: Fix MainActivity and Build
        script: |
          # 1. إنشاء المجلد المطلوب
          mkdir -p android/app/src/main/kotlin/com/almwld/yemen_project
          
          # 2. التحميل والبناء
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
