workflows:
  flex-yemen-release:
    name: Flex Yemen Stable Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
    triggering:
      events:
        - push
      cancel_previous_builds_on_new_commit: true # سيقوم بإلغاء البناء القديم وتشغيل الجديد فقط
    scripts:
      - name: Build Android APK
        script: |
          flutter config --no-analytics
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
