workflows:
  flex-yemen-release:
    name: Flex Yemen M2 Ultimate
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Setup and Build APK
        script: |
          # 1. تنظيف شامل وإعادة بناء القالب
          rm -rf android
          flutter create . --platforms android --org com.almwld
          
          # 2. ترقية المكتبة المسببة للمشكلة تلقائياً
          flutter pub add app_links
          
          # 3. حقن الإعدادات في مكانين (local.properties و build.gradle)
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 4. إصلاح ملف settings.gradle لضمان قراءة ملف الـ SDK
          sed -i '' '1i          def localProperties = new Properties()          def localPropertiesFile = new File(settingsDir, "local.properties")          if (localPropertiesFile.exists()) {              localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }          }          def flutterSdkPath = localProperties.getProperty("flutter.sdk")          if (flutterSdkPath == null) throw new GradleException("flutter.sdk not set")          includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")          ' android/settings.gradle

          # 5. البناء النهائي
          flutter pub get
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
