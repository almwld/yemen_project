workflows:
  flutter-clean-build:
    name: Yemen Market – Clean Cloud Build
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: 🧱 Create clean Flutter app
        script: |
          flutter create app
          rm -rf app/lib
          rm -rf app/assets
          cp -r lib app/
          cp -r assets app/ || true
          cp pubspec.yaml app/
          cd app

      - name: 📦 Pub Get
        script: flutter pub get

      - name: 🏗️ Build APK
        script: flutter build apk --release --no-tree-shake-icons

    artifacts:
      - app/build/app/outputs/flutter-apk/app-release.apk
