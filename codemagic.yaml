workflows:
  android-workflow:
    name: Yemen Market - Absolute Fix
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Master Reconstruction
        script: | 
          # 1. حفظ الكود والملفات الهامة في مكان آمن مؤقت خارج المجلد الحالي
          mkdir -p ../safe_zone
          cp -r lib ../safe_zone/
          [ -d assets ] && cp -r assets ../safe_zone/
          cp pubspec.yaml ../safe_zone/
          [ -f google-services.json ] && cp google-services.json ../safe_zone/

          # 2. تفريغ المجلد الحالي تماماً من أي ملفات أندرويد تالفة
          rm -rf *
          rm -rf .??*

          # 3. إعادة إنشاء هيكل المشروع نظيفاً 100%
          flutter create . --platforms android --org com.yemenmarket --project-name yemen_market

          # 4. استعادة كودك وملفاتك للمشروع الجديد
          rm -rf lib assets pubspec.yaml
          cp -r ../safe_zone/lib .
          [ -d ../safe_zone/assets ] && cp -r ../safe_zone/assets .
          cp ../safe_zone/pubspec.yaml .

          # 5. زرع ملف Firebase وإعدادات Gradle بشكل صحيح
          mkdir -p android/app
          if [ -f ../safe_zone/google-services.json ]; then
            cp ../safe_zone/google-services.json android/app/
          fi

          # إعداد Gradle (طريقة بديلة وأكثر أماناً من sed)
          echo "buildscript { dependencies { classpath 'com.google.gms:google-services:4.4.1' } }" > android/build.gradle.temp
          cat android/build.gradle >> android/build.gradle.temp
          mv android/build.gradle.temp android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

      - name: Final Production Build
        script: |
          flutter pub get
          flutter clean
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
