workflows:
  android-workflow:
    name: Yemen Market Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Set up local.properties
        script: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      - name: Get Flutter packages
        script: flutter pub get
      - name: Upgrade dependencies
        script: flutter pub upgrade --major-versions
      - name: Build Android APK
        script: flutter build apk --release --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/**/app-release.apk
    publishing:
      email:
        recipients:
          - almwld@example.com # ضع إيميلك هنا لتصلك الرسالة عند النجاح
