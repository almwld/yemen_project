workflows:
  flex-yemen-release:
    name: Flex Yemen Final Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
    triggering:
      events:
        - push
    scripts:
      - name: Environment Setup and Fixes
        script: |
          # إصلاح ملف MainActivity سحابياً لتجاوز أخطاء Kotlin
          mkdir -p android/app/src/main/kotlin/com/almwld/yemen_project
          cat <<EOT > android/app/src/main/kotlin/com/almwld/yemen_project/MainActivity.kt
          package com.almwld.yemen_project
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }
          EOT
          
          # جلب المكتبات وبناء التطبيق
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
