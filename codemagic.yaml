workflows:
  android-workflow:
    name: Yemen Project - Technical Fix
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Critical Build Script
        script: |
          # إنشاء مشروع جديد متوافق مع 2026
          flutter create --platforms android build_zone
          rm -rf build_zone/lib
          
          # نقل الكود مع التأكد من سلامة المجلدات
          cp -R src/lib build_zone/
          cp src/pubspec.yaml build_zone/
          [ -d src/assets ] && cp -R src/assets build_zone/ || true
          
          cd build_zone
          flutter pub get
          
          # البناء الحقيقي
          flutter build apk --release --no-tree-shake-icons
          
          # نقل الـ APK لمكان العرض
          mkdir -p $CM_BUILD_DIR/build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk $CM_BUILD_DIR/build/app/outputs/flutter-apk/
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
