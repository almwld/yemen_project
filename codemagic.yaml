workflows:
  flex-yemen-release:
    name: Flex Yemen Final Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
    scripts:
      - name: Fix MainActivity
        script: |
          mkdir -p android/app/src/main/kotlin/com/almwld/yemen_project
          echo "package com.almwld.yemen_project" > android/app/src/main/kotlin/com/almwld/yemen_project/MainActivity.kt
          echo "import io.flutter.embedding.android.FlutterActivity" >> android/app/src/main/kotlin/com/almwld/yemen_project/MainActivity.kt
          echo "class MainActivity: FlutterActivity() {}" >> android/app/src/main/kotlin/com/almwld/yemen_project/MainActivity.kt
      - name: Build Android APK
        script: |
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
