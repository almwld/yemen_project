workflows:
  android-workflow:
    name: Yemen Market - Absolute Clean Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Build Preparation
        script: | 
          # إنشاء مشروع جديد تماماً في مجلد مؤقت
          flutter create --platforms android --org com.yemenmarket --project-name yemen_market ../fresh_app
          
          # نقل ملفات البرمجة والملحقات إليه
          cp -r lib ../fresh_app/
          cp pubspec.yaml ../fresh_app/
          [ -d assets ] && cp -r assets ../fresh_app/
          [ -f google-services.json ] && cp google-services.json ../fresh_app/android/app/

          # تجهيز إعدادات Gradle في المشروع الجديد
          cd ../fresh_app
          sed -i '' 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.1"/' android/build.gradle || sed -i 's/dependencies {/dependencies {\n        classpath "com.google.gms:google-services:4.4.1"/' android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          
          # بدء البناء من داخل المجلد النظيف
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
          # نقل الـ APK الناتج لمجلد المخرجات الرئيسي
          mkdir -p $CM_BUILD_DIR/build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk $CM_BUILD_DIR/build/app/outputs/flutter-apk/
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
