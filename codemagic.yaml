workflows:
  android-workflow:
    name: Yemen Market Build
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Force Clean and Get Packages
        script: | 
          cd src
          flutter clean
          flutter pub get
      - name: Build Android APK
        script: | 
          cd src
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
