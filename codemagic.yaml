workflows:
  flutter-apk-workflow:
    name: Yemen Market – TEMP Flutter APK (Codemagic)
    max_build_duration: 60

    environment:
      flutter: 3.19.6
      vars:
        PACKAGE_NAME: "com.yemen.market"

    scripts:
      - name: 📦 Flutter Pub Get
        script: |
          flutter pub get

      - name: 🔍 Flutter Analyze (non-blocking)
        script: |
          flutter analyze || true

      - name: 🏗️ Build APK (Release)
        script: |
          flutter build apk --release --no-tree-shake-icons

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
