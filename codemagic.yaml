workflows:
  flutter-apk-workflow:
    name: Yemen Market – Cloud APK (SAFE MODE)
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: 🧱 Create Flutter App Shell
        script: |
          flutter create app
          rm -rf app/lib
          cp -r lib app/
          cp pubspec.yaml app/
          cp -r assets app/ || true
          cd app

      - name: 📦 Pub Get
        script: flutter pub get

      - name: 🏗️ Build APK
        script: flutter build apk --release --no-tree-shake-icons

    artifacts:
      - app/build/app/outputs/flutter-apk/app-release.apk
