workflows:
  flex-yemen-release:
    name: Flex Yemen Final Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
    triggering:
      events:
        - push
      cancel_previous_builds_on_new_commit: true
    scripts:
      - name: Environment Setup and Fixes
        script: |
          # إنشاء المجلد وكتابة الملف لإصلاح خطأ MainActivity
          mkdir -p android/app/src/main/kotlin/com/almwld/yemen_project
          
          # استخدام echo بدلاً من cat لتجنب أخطاء الإزاحة في YAML
          echo "package com.almwld.yemen_project
          import io.flutter.embedding.android.FlutterActivity
          class MainActivity: FlutterActivity() {
          }" > android/app/src/main/kotlin/com/almwld/yemen_project/MainActivity.kt
          
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
