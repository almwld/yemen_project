workflows:
  flex-yemen-final:
    name: Flex Yemen Market Pro
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Generate Icons and Build
        script: |
          # تنظيف وبناء قالب الأندرويد
          rm -rf android
          flutter create . --platforms android --org com.almwld
          
          # تثبيت المكتبات وتوليد الأيقونات
          flutter pub get
          flutter pub run flutter_launcher_icons

          # ضبط اسم التطبيق الظاهري
          sed -i '' 's/android:label="yemen_project"/android:label="Flex Yemen Market"/' android/app/src/main/AndroidManifest.xml

          # إضافة الصلاحيات اللازمة
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' android/app/src/main/AndroidManifest.xml

          # إعدادات الـ SDK والبناء
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
