workflows:
  flex-yemen-final:
    name: Flex Yemen Final Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Full Setup and Fix
        script: |
          rm -rf android
          flutter create . --platforms android --org com.almwld
          
          # حقن الاسم الصحيح Flex Yemen Market
          sed -i '' 's/android:label="flex_yemen"/android:label="Flex Yemen Market"/' android/app/src/main/AndroidManifest.xml

          # حقن الصلاحيات
          sed -i '' '/<application/i \
          <uses-permission android:name="android.permission.INTERNET" /> \
          <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" /> \
          <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' android/app/src/main/AndroidManifest.xml

          # إعدادات الـ SDK 36
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=36" >> android/local.properties
          echo "flutter.targetSdkVersion=36" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties

          cat <<EOT > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }
          android {
              namespace "com.almwld"
              compileSdk 36
              defaultConfig {
                  applicationId "com.almwld"
                  minSdk 21
                  targetSdk 36
                  versionCode 1
                  versionName "1.0.0"
                  multiDexEnabled true
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
                  coreLibraryDesugaringEnabled true
              }
              kotlinOptions { jvmTarget = '1.8' }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                      minifyEnabled false
                      shrinkResources false
                  }
              }
          }
          dependencies {
              coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.0.3'
          }
          EOT

          flutter pub get
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
