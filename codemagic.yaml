workflows:
  android-workflow:
    name: Yemen Market Root Fix
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Reconstruct Android Folder
        script: |
          # 1. حذف مجلد أندرويد القديم المسبب للمشاكل
          rm -rf android
          
          # 2. إجبار فلاتر على إنشاء ملفات أندرويد جديدة متوافقة مع الجذر
          flutter create . --platforms android --org com.yemen.market
          
          # 3. تحميل المكتبات وتحديث الروابط
          flutter pub get
          
      - name: Build Android APK
        script: |
          # البناء باستخدام المجلد الجديد
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
