workflows:
  android-workflow:
    name: Yemen Market - Absolute Victory
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Build From Subfolder
        script: | 
          # الآن السيرفر لن يجد pubspec في المجلد الحالي فلن يطلق الخطأ
          # سنقوم ببناء المشروع داخل مجلد جديد تماماً
          flutter create --platforms android build_app
          
          # استبدال ملفات المشروع الجديد بملفاتك الموجودة في 'src'
          rm -rf build_app/lib
          cp -r src/lib build_app/
          cp src/pubspec.yaml build_app/
          [ -d src/assets ] && cp -r src/assets build_app/
          
          # إعداد الفايربيس
          if [ -f src/google-services.json ]; then
            mkdir -p build_app/android/app
            cp src/google-services.json build_app/android/app/
          fi

          cd build_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
          # نقل النتيجة للخارج ليراها Codemagic
          mkdir -p $CM_BUILD_DIR/build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk $CM_BUILD_DIR/build/app/outputs/flutter-apk/
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
