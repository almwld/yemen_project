workflows:
  flutter-apk-workflow:
    name: Yemen Market Final Fix
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Build Project
        script: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
