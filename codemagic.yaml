workflows:
  flex-yemen-release:
    name: Flex Yemen Ultimate Success
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
    scripts:
      - name: Full Android Reconstruct
        script: |
          # 1. تنظيف عميق وحذف المجلدات المعطوبة
          rm -rf android
          rm -rf .dart_tool
          rm pubspec.lock
          
          # 2. إعادة إنشاء بيئة الأندرويد لـ "فلكس يمن" من الصفر
          # هذا سيقوم بإنشاء الملفات المتوافقة مع الإضافات تلقائياً
          flutter create . --platforms android --org com.almwld
          
          # 3. جلب المكتبات وتحديث الروابط
          flutter pub get
          
          # 4. بناء الـ APK مع تنظيف الـ Gradle
          cd android && ./gradlew clean && cd ..
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
