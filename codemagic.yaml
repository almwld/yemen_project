workflows:
  android-workflow:
    name: Yemen Market - Subfolder Strike
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Create Isolated Project
        script: | 
          # 1. إنشاء مشروع جديد تماماً في مجلد فرعي اسمه 'yemen_app'
          flutter create --platforms android --org com.yemenmarket --project-name yemen_market yemen_app
          
          # 2. نقل ملفاتك الحيوية إلى المجلد الفرعي الجديد
          rm -rf yemen_app/lib yemen_app/pubspec.yaml
          cp -r lib yemen_app/
          cp pubspec.yaml yemen_app/
          [ -d assets ] && cp -r assets yemen_app/
          [ -f google-services.json ] && cp google-services.json yemen_app/android/app/

          # 3. إعداد الفايربيس داخل المجلد الفرعي
          cd yemen_app
          echo "buildscript { dependencies { classpath 'com.google.gms:google-services:4.4.1' } }" > android/build.gradle.new
          cat android/build.gradle >> android/build.gradle.new
          mv android/build.gradle.new android/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle

      - name: Build From Subfolder
        script: |
          # الدخول للمجلد الفرعي للبناء
          cd yemen_app
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
          # نقل الـ APK للمكان المتوقع
          mkdir -p ../build/app/outputs/flutter-apk/
          cp build/app/outputs/flutter-apk/app-release.apk ../build/app/outputs/flutter-apk/
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
