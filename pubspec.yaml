name: yemen_project
description: A new Flutter project for Flex Yemen.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
  assets:
    - assets/logo.png
    sdk: flutter
  cupertino_icons: ^1.0.6
  animations: ^2.0.11
  google_maps_flutter: ^2.5.3
  assets:
    - assets/logo.png
  mobile_scanner: ^3.2.0
  sqflite: ^2.3.0
  path: ^1.8.3

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  assets:
    - assets/logo.png
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/logo.png"
