name: yemen_project
description: "Flex Yemen Market - Golden Edition"
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  supabase_flutter: ^2.0.2
  google_fonts: ^6.1.0
  flutter_bloc: ^8.1.3
  geolocator: ^10.1.0
  image_picker: ^1.0.4

dev_dependencies:
  share_plus: ^10.1.4
  image_picker: ^1.1.2
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false # قمنا بتعطيل هذا لتجنب الخطأ
  image_path: "assets/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
