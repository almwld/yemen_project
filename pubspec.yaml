name: yemen_market
description: Yemen Market App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.3

  # Network / Bot
  http: ^1.2.0

  # Localization
  intl: ^0.19.0

  # Local storage (logs – admin – payments)
  shared_preferences: ^2.2.2

  # Images (wallet image – admin only)
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

dependencies:
  lottie: ^3.1.0

dependencies:
  firebase_auth: ^4.15.3
