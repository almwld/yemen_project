workflows:
  android-workflow:
    name: Yemen Market Final Fix
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Reconstruct Project Structure
        script: |
          # 1. إنشاء مشروع نظيف مؤقتاً في المجلد الرئيسي للسيرفر
          flutter create --org com.yemen.market --project-name yemen_market temp_fix
          
          # 2. نقل ملفات الأندرويد والـ Gradle الجديدة إلى مجلد مشروعك (src)
          cp -r temp_fix/android src/
          
          # 3. الدخول لمجلد مشروعك وتنظيفه
          cd src
          flutter pub get
          
      - name: Build Android APK
        script: |
          cd src
          # التأكد من وجود ملفات أندرويد قبل البدء
          if [ -d "android" ]; then
            flutter build apk --release --no-tree-shake-icons
          else
            echo "Error: Android folder not found!"
            exit 1
          fi
    artifacts:
      - src/build/app/outputs/flutter-apk/*.apk
