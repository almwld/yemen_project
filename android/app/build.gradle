plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.example.yemen_project"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.yemen_project"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// هذا الجزء هو الذي سيحل الـ 33 خطأ فوراً
dependencies {
    implementation "io.flutter:flutter_embedding_release:1.0.0-+"
}

flutter {
    source '../..'
}
