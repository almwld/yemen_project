plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.yemen_project"
    compileSdk 34

    defaultConfig {
        applicationId "com.example.yemen_project"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// هذا الجزء هو "المفتاح" الذي سيقضي على الـ 33 خطأ
dependencies {
    def flutterCompileMode = 'release'
    if (project.hasProperty('target-platform')) {
        def targetPlatform = project.property('target-platform')
        if (targetPlatform.contains('arm64')) {
            implementation "io.flutter:arm64_v8a_release:1.0.0-+"
        }
    }
    implementation "io.flutter:flutter_embedding_release:1.0.0-+"
    implementation "androidx.annotation:annotation:1.7.0"
}

flutter {
    source '../..'
}
