workflows:
  flex-yemen-release:
    name: Flex Yemen Final Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: Fix Android Environment
        script: |
          rm -rf android
          flutter create . --platforms android --org com.almwld
      - name: Build Android APK
        script: |
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
