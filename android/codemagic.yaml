workflows:
  flex-yemen-release:
    name: Flex Yemen Final Fix
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: 3.24.0
    scripts:
      - name: 1. Setup and Patch Android
        script: |
          # إعادة إنشاء مجلد الأندرويد
          rm -rf android
          flutter create . --platforms android --org com.almwld
          
          # حقن إصدارات الـ SDK يدوياً في الملفات لتجنب خطأ "unknown property flutter"
          sed -i '' 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i '' 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          sed -i '' 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          
          # إصلاح ملف gradle.properties لضمان عمل الـ AndroidX
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          
          # ربط الـ SDK في ملف local.properties
          echo "flutter.sdk=" > android/local.properties
      - name: 2. Build Android APK
        script: |
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
