workflows:
  flex-yemen-release:
    name: Flex Yemen Final Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      flutter: stable
    scripts:
      - name: 1. Fix MainActivity
        script: |
          # تنظيف وإعادة بناء مدخل الأندرويد لضمان عدم وجود أخطاء
          rm -rf android
          flutter create . --platforms android --org com.almwld
      - name: 2. Build Android APK
        script: |
          # هذه الخطوة هي التي ستظهر الآن بوضوح في القائمة
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
