workflows:
  flex-yemen-release:
    name: Flex Yemen M2 Ultimate
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: 3.24.0
    scripts:
      - name: Setup and Build APK
        script: |
          # 1. إعادة بناء البيئة
          rm -rf android
          flutter create . --platforms android --org com.almwld
          
          # 2. حقن الخصائص يدوياً (لحل مشكلة app_links الصعبة)
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          echo "flutter.minSdkVersion=21" >> android/local.properties
          
          # 3. البناء النهائي
          flutter pub get
          flutter build apk --release --obfuscate --split-debug-info=symbols
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - Binobaeid@gmail.com
