name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث الإصدار

      - name: Set up Java
        uses: actions/setup-java@v4 # تحديث الإصدار
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4 # الإصلاح الجوهري هنا v4
        with:
          name: Flex-Yemen-Release
          path: build/app/outputs/flutter-apk/app-release.apk
