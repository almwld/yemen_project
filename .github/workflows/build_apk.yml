name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Auto-Fix & Build
        run: |
          # 1. مسح مجلد الأندرويد المليء بالتعديلات اليدوية بالكامل
          rm -rf android/
          
          # 2. ترك فلوتر ينشئ مجلد أندرويد حديث ونظيف 100%
          flutter create . --platforms android --org com.almwld.yemen
          
          # 3. الضربة القاضية: تحديث المكتبات القديمة (مثل app_links) لنسخ تدعم الـ SDK الجديد
          flutter pub upgrade
          
          # 4. بناء التطبيق بسلام
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flex-Yemen-APK
          path: build/app/outputs/flutter-apk/app-release.apk
