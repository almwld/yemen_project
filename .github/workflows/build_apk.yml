name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17' # نسخة جافا 17 هي الأكثر استقراراً حالياً

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0' # إجبار السيرفر على نسخة مستقرة لتجنب أخطاء المحرك
          channel: 'stable'

      - name: Prepare Environment & Add Plugins
        run: |
          flutter clean
          # إضافة المكتبات برمجياً لأنك لا تملك فلوتر محلي
          flutter pub add flutter_svg
          flutter pub get
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flex-Yemen-Release
          path: build/app/outputs/flutter-apk/app-release.apk
