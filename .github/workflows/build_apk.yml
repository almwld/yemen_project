name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      
      - name: Master Build
        run: |
          flutter clean
          # إنشاء المشروع (سيفشل في بناء APK لكن سينجح في إنشاء الملفات)
          flutter create . --platforms android --org com.almwld.yemen || true
          
          # استبدال ملف build.gradle بملفنا الذي يحتوي على الإصلاح العالمي
          cp android/build.gradle android/build.gradle.bak # نسخة احتياطية
          # سنستخدم الملف الذي رفعناه من Termux
          
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Flex-Yemen-APK
          path: build/app/outputs/flutter-apk/app-release.apk
