name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Reconstruct Android Project
        run: |
          # مسح أي مخلفات سابقة
          flutter clean
          
          # إجبار فلوتر على إنشاء مجلد أندرويد جديد تماماً ومتوافق
          flutter create . --platforms android --org com.almwld.yemen
          
          # جلب المكتبات
          flutter pub get
          
          # ضبط الخصائص للسيرفر
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Build APK
        run: |
          # البناء بصيغة Release للـ ARM64 فقط لتسريع العملية وتقليل الأخطاء
          flutter build apk --release --target-platform android-arm64 --no-tree-shake-icons
