name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'

      - name: Reconstruct Android Project
        run: |
          # تنظيف أي بقايا سابقة
          flutter clean
          # إنشاء مجلد أندرويد جديد ونظيف متوافق مع v2 تلقائياً
          flutter create . --platforms android --org com.almwld.yemen
          # تحميل المكتبات
          flutter pub get

      - name: Generate Launcher Icons
        run: dart run flutter_launcher_icons || true

      - name: Build APK
        run: |
          # التأكد من ربط ملفات الـ SDK
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
