name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Fix Android Linkage
        run: |
          # حذف أي ملفات ربط قديمة تسبب التعارض
          rm -rf android/app/src/main/java/io/flutter/plugins/
          
          # إعادة ضبط local.properties بشكل صحيح للسيرفر
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties
          
          # تفعيل الربط التلقائي للمكتبات
          flutter pub get
          
      - name: Build APK
        run: |
          # سنستخدم أمر build مباشر يحاول إصلاح المشاكل تلقائياً
          flutter build apk --release --no-tree-shake-icons --target-platform android-arm64
