name: Build Flex Yemen APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
      
      - name: Reconstruct Android Project
        run: flutter create . --platforms android --org com.example --project-name yemen_project

      - name: Force Update Kotlin & Java Version
        run: |
          # 1. تحديث نسخة الكوتلن في ملف build.gradle الرئيسي (أياً كانت الصيغة)
          find android/ -name "build.gradle" -exec sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.0"/' {} +
          find android/ -name "build.gradle" -exec sed -i 's/kotlin_version = .*/kotlin_version = "1.9.0"/' {} +
          
          # 2. تحديث نسخة الكوتلن في حال كانت موجودة بصيغة id "org.jetbrains.kotlin.android" version
          find android/ -name "*.gradle" -exec sed -i 's/version "[0-9.]*"/version "1.9.0"/' {} +
          
          # 3. التأكد من توافق Java 17
          find android/app/ -name "build.gradle" -exec sed -i 's/sourceCompatibility JavaVersion.VERSION_.*/sourceCompatibility JavaVersion.VERSION_17/' {} +
          find android/app/ -name "build.gradle" -exec sed -i 's/targetCompatibility JavaVersion.VERSION_.*/targetCompatibility JavaVersion.VERSION_17/' {} +
          find android/app/ -name "build.gradle" -exec sed -i 's/jvmTarget = .*/jvmTarget = "17"/' {} +

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-release
          path: build/app/outputs/flutter-apk/app-release.apk
