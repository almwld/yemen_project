name: Build Flex Yemen APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
      
      # الخطوة الأساسية: مسح أي إعدادات قديمة وإعادة إنشاء مشروع أندرويد متوافق مع Flutter 3.22
      - name: Fresh Android Project Generation
        run: |
          rm -rf android
          flutter create . --platforms android --org com.flexyemen --project-name yemen_project
          flutter pub get

      - name: Build APK
        run: |
          # السيرفر سيعالج نسخة الكوتلن والجافا تلقائياً أثناء البناء
          flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-release
          path: build/app/outputs/flutter-apk/app-release.apk
