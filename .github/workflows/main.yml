name: Build Flex Yemen APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
      
      - name: Fresh Android Project Generation
        run: |
          rm -rf android
          flutter create . --platforms android --org com.flexyemen --project-name yemen_project
          
          # تحديث نسخة الكوتلن في ملف الإعدادات الجديد (الطريقة الأضمن لـ Flutter 3.22)
          sed -i 's/id "org.jetbrains.kotlin.android" version "[0-9.]*"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
          
          # تحديث ملف build.gradle الاحتياطي
          if [ -f android/build.gradle ]; then
            sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.10"/' android/build.gradle
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-release
          path: build/app/outputs/flutter-apk/app-release.apk
