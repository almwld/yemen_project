name: Build Flex Yemen APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'
          channel: 'stable'
      
      # توليد مجلد أندرويد جديد ونظيف باسم الحزمة الصحيح
      - name: Reconstruct Android Project
        run: flutter create . --platforms android --org com.example --project-name yemen_project

      - name: Build APK
        run: |
          flutter pub get
          # بناء ملف واحد شامل يعمل في كل اليمن
          flutter build apk --release --no-tree-shake-icons
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-release
          path: build/app/outputs/flutter-apk/app-release.apk
