name: Build Flex Yemen APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تحديث لـ v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2' # إصدار حديث ومستقر
          channel: 'stable'
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3 # الأكشن الرسمي الحديث
        with:
          gradle-version: '8.0'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
        
      - name: Upload APK
        uses: actions/upload-artifact@v4 # تحديث لـ v4 الإلزامي
        with:
          name: flex-yemen-release
          path: android/app/build/outputs/apk/release/app-release.apk
